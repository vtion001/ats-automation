name: Deploy AI Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'requirements-server.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name agscontainerreg

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -t agscontainerreg.azurecr.io/ags-ai-server:${{ github.sha }} -t agscontainerreg.azurecr.io/ags-ai-server:latest -t agscontainerreg.azurecr.io/ags-ai-server:v$(date +%Y%m%d%H%M%S) .
          docker push agscontainerreg.azurecr.io/ags-ai-server:${{ github.sha }}
          docker push agscontainerreg.azurecr.io/ags-ai-server:latest
          docker push agscontainerreg.azurecr.io/ags-ai-server:v$(date +%Y%m%d%H%M%S)

      - name: Deploy to Azure App Service
        run: |
          # Get ACR password
          ACR_PASSWORD=$(az acr credential show --name agscontainerreg --query "passwords[0].value" -o tsv)

          # Create App Service Plan if not exists
          az appservice plan create \
            --name asp-ags \
            --resource-group ags-rg \
            --location eastus \
            --sku B1 \
            --is-linux \
            2>/dev/null || true

          # Create Web App if not exists
          az webapp create \
            --name ags-ai-server \
            --resource-group ags-rg \
            --plan asp-ags \
            --deployment-container-image-name agscontainerreg.azurecr.io/ags-ai-server:latest \
            --docker-registry-server-user agscontainerreg \
            --docker-registry-server-password "$ACR_PASSWORD" \
            --docker-registry-server-url https://agscontainerreg.azurecr.io \
            2>/dev/null || true

          # Configure Web App settings
          az webapp config appsettings set \
            --name ags-ai-server \
            --resource-group ags-rg \
            --settings \
              PORT=8000 \
              PYTHONUNBUFFERED=1 \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
              DOCKER_REGISTRY_SERVER_URL=https://agscontainerreg.azurecr.io \
              DOCKER_REGISTRY_SERVER_USERNAME=agscontainerreg \
              DOCKER_REGISTRY_SERVER_PASSWORD="$ACR_PASSWORD" \
              ATS_API_KEY=${{ secrets.OPENROUTER_API_KEY }} \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
            2>/dev/null || true

          # Enable always on
          az webapp config set \
            --name ags-ai-server \
            --resource-group ags-rg \
            --always-on true \
            --http20-enabled true \
            2>/dev/null || true

          # Update container image
          az webapp deployment container config \
            --name ags-ai-server \
            --resource-group ags-rg \
            --enable-cd true \
            2>/dev/null || true

          # Trigger deployment
          az webapp deployment slot create \
            --name ags-ai-server \
            --resource-group ags-rg \
            --slot staging \
            2>/dev/null || true

          # Update staging slot with new image
          az webapp deployment container update \
            --name ags-ai-server \
            --resource-group ags-rg \
            --slot staging \
            --container-image-name agscontainerreg.azurecr.io/ags-ai-server:latest \
            2>/dev/null || true

          # Swap slots to promote staging to production
          az webapp deployment slot swap \
            --name ags-ai-server \
            --resource-group ags-rg \
            --slot staging \
            --target-slot production \
            2>/dev/null || true

      - name: Show Deployment Info
        run: |
          echo "====================================="
          echo "Deployment Complete!"
          echo "====================================="
          echo "Server URL: https://ags-ai-server.azurewebsites.net"
          echo "Health: https://ags-ai-server.azurewebsites.net/health"
