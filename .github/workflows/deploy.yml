name: Deploy AI Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'requirements-server.txt'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name agscontainerreg

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -t agscontainerreg.azurecr.io/ags-ai-server:${{ github.sha }} -t agscontainerreg.azurecr.io/ags-ai-server:latest .
          docker push agscontainerreg.azurecr.io/ags-ai-server:${{ github.sha }}
          docker push agscontainerreg.azurecr.io/ags-ai-server:latest

      - name: Deploy to Azure Container Instance
        run: |
          ACR_PASSWORD=$(az acr credential show --name agscontainerreg --query "passwords[0].value" -o tsv)
          
          az container delete --name ags-ai-server --resource-group ags-rg --yes 2>/dev/null || true
          
          az container create \
            --name ags-ai-server \
            --resource-group ags-rg \
            --location eastus \
            --os-type Linux \
            --image agscontainerreg.azurecr.io/ags-ai-server:latest \
            --registry-login-server agscontainerreg.azurecr.io \
            --registry-username agscontainerreg \
            --registry-password "$ACR_PASSWORD" \
            --cpu 0.5 --memory 1 \
            --port 8000 \
            --protocol TCP \
            --dns-name-label ags-ai-server \
            --environment-variables ATS_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            --output table

      - name: Show Deployment Info
        run: |
          echo "====================================="
          echo "Deployment Complete!"
          echo "====================================="
          IP=$(az container show --name ags-ai-server --resource-group ags-rg --query "ipAddress.ip" -o tsv)
          echo "Server URL: http://$IP:8000"
          echo "Health: http://$IP:8000/health"
