name: Deploy AI Server to Azure Functions

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'requirements*.txt'
      - 'function_app.py'
      - 'host.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Azure Functions App
        run: |
          # Set default subscription
          az account set -s ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          # Create resource group if not exists
          az group create \
            --name ags-rg \
            --location eastus \
            2>/dev/null || echo "Resource group already exists"

          # Create Storage Account (required for Azure Functions)
          az storage account create \
            --name agsaistorage \
            --resource-group ags-rg \
            --location eastus \
            --sku Standard_LRS \
            2>/dev/null || echo "Storage account already exists"

          # Create Consumption Plan (Free tier)
          az functionapp plan create \
            --name asp-ags-functions \
            --resource-group ags-rg \
            --location eastus \
            --sku Consumption \
            --min-instances 0 \
            --max-burst 200 \
            2>/dev/null || echo "App service plan already exists"

          # Create Python Function App
          az functionapp create \
            --name ags-ai-server \
            --resource-group ags-rg \
            --storage-account agsaistorage \
            --plan asp-ags-functions \
            --runtime python \
            --runtime-version 3.11 \
            --functions-version 4 \
            2>/dev/null || echo "Function app already exists"

      - name: Configure Function App Settings
        run: |
          # Set application settings
          az functionapp config appsettings set \
            --name ags-ai-server \
            --resource-group ags-rg \
            --settings \
              PYTHON_VERSION=3.11 \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
              ATS_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              AzureWebJobsFeatureFlags=EnableWorkerIndex \
              ENABLE_ORYX_BUILD=true \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              FRAMEWORK_VERSION=3.11 \
            2>/dev/null || echo "Settings already configured"

          # Configure CORS (allow all for Chrome extension)
          az functionapp cors update \
            --name ags-ai-server \
            --resource-group ags-rg \
            --allowed-origins "*" \
            --allowed-methods GET POST OPTIONS PUT DELETE PATCH \
            --allowed-headers "*" \
            --allow-credentials true \
            2>/dev/null || echo "CORS already configured"

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ags-ai-server
          package: .
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: true
          python-version: 3.11

      - name: Show Deployment Info
        run: |
          echo "====================================="
          echo "Deployment Complete!"
          echo "====================================="
          echo "Server URL: https://ags-ai-server.azurewebsites.net"
          echo "Health: https://ags-ai-server.azurewebsites.net/health"
          echo "API: https://ags-ai-server.azurewebsites.net/api/analyze"
          echo ""
          echo "IMPORTANT: Update all configuration files to use:"
          echo "https://ags-ai-server.azurewebsites.net"
