name: Deploy AI Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'requirements-server.txt'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name agscontainerreg

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -t agscontainerreg.azurecr.io/ags-ai-server:${{ github.sha }} -t agscontainerreg.azurecr.io/ags-ai-server:latest .
          docker push agscontainerreg.azurecr.io/ags-ai-server:${{ github.sha }}
          docker push agscontainerreg.azurecr.io/ags-ai-server:latest

      - name: Deploy to Azure Container Apps
        run: |
          # Check if environment exists, create if not
          az containerapp env show --name ags-env --resource-group ags-rg 2>/dev/null || \
            az containerapp env create --name ags-env --resource-group ags-rg --location eastus

          # Get ACR password
          ACR_PASSWORD=$(az acr credential show --name agscontainerreg --query "passwords[0].value" -o tsv)

          # Deploy or update container app
          az containerapp update \
            --name ags-ai-server \
            --resource-group ags-rg \
            --image agscontainerreg.azurecr.io/ags-ai-server:latest \
            --registry-server agscontainerreg.azurecr.io \
            --registry-username agscontainerreg \
            --registry-password "$ACR_PASSWORD" \
            --cpu 0.5 --memory 1 \
            --min-replicas 0 --max-replicas 1 \
            --env-vars "ATS_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" \
            2>/dev/null || \
          az containerapp create \
            --name ags-ai-server \
            --resource-group ags-rg \
            --environment ags-env \
            --image agscontainerreg.azurecr.io/ags-ai-server:latest \
            --registry-server agscontainerreg.azurecr.io \
            --registry-username agscontainerreg \
            --registry-password "$ACR_PASSWORD" \
            --cpu 0.5 --memory 1 \
            --ingress external \
            --target-port 8000 \
            --transport http \
            --min-replicas 0 --max-replicas 1 \
            --env-vars "ATS_API_KEY=${{ secrets.OPENROUTER_API_KEY }}"

      - name: Show Deployment Info
        run: |
          echo "====================================="
          echo "Deployment Complete!"
          echo "====================================="
          echo "Server URL: https://ags-ai-server.ashyocean-acabefe6.eastus.azurecontainerapps.io"
          echo "Health: https://ags-ai-server.ashyocean-acabefe6.eastus.azurecontainerapps.io/health"
