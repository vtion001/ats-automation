<!DOCTYPE html>
<html>
<head>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #3182ce 100%);
            color: white;
            padding: 20px;
        }
        h2 {
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
        }
        .btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e3a5f 0%, #3182ce 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #2c5282 0%, #3182ce 100%);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.25);
        }
        .tab-list {
            max-height: 280px;
            overflow-y: auto;
            margin: 15px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px;
        }
        .tab-item {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            margin: 6px 0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .tab-item:hover {
            background: rgba(255,255,255,0.15);
        }
        .tab-item.active {
            background: linear-gradient(135deg, #1e3a5f 0%, #3182ce 100%);
            border: 1px solid #3182ce;
        }
        .tab-icon { width: 20px; height: 20px; border-radius: 4px; }
        .tab-info { flex: 1; overflow: hidden; }
        .tab-title {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tab-url {
            font-size: 11px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
            text-align: center;
            font-weight: 500;
        }
        .status.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }
        .status.stopped {
            background: rgba(255,255,255,0.1);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            flex-shrink: 0;
        }
        .status.recording .status-dot {
            background: #ef4444;
            animation: pulseDot 1s infinite;
        }
        .status-dot.working {
            background: #48bb78;
            animation: pulseDot 1s infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .recording-timer {
            font-variant-numeric: tabular-nums;
            opacity: 0.9;
            margin-left: 8px;
            padding-left: 8px;
            border-left: 1px solid rgba(255,255,255,0.3);
        }
        .recording-timer.hidden { display: none; }
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .ats-score-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            min-width: 48px;
            text-align: center;
        }
        .ats-score-badge.hot { background: #ef4444; }
        .ats-score-badge.warm { background: #f59e0b; }
        .ats-score-badge.cold { background: #6b7280; }
        .btn-copy-notes {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        .btn-copy-notes:hover { background: rgba(255,255,255,0.2); }
        .hidden { display: none; }
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <h2>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 8px;">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
        Tab Audio Capture
    </h2>
    
    <div class="section-title">Select Tab to Record</div>
    <button id="refreshBtn" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        Refresh Active Tabs
    </button>
    
    <div id="tabList" class="tab-list">
        <p style="opacity: 0.7; text-align: center; padding: 20px;">Click refresh to load tabs</p>
    </div>
    
    <button id="startBtn" class="btn btn-primary hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        Start Recording
    </button>
    <button id="stopBtn" class="btn btn-primary hidden" style="background: #ef4444;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12"></rect>
        </svg>
        Stop Recording
    </button>
    
    <div id="status" class="status stopped">
        <div class="status-indicator">
            <span class="status-dot"></span>
            <span id="statusText">Select a tab and click Start</span>
            <span id="recordingTimer" class="recording-timer hidden">0:00</span>
        </div>
    </div>

    <script src="tab-selector.js"></script>
</body>
</html>
