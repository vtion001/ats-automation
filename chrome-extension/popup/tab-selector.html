<!DOCTYPE html>
<html>
<head>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        h2 { margin-bottom: 15px; font-size: 18px; }
        .btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #22c55e;
            color: white;
        }
        .btn-primary:hover { background: #16a34a; }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.3); }
        .tab-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 15px 0;
        }
        .tab-item {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tab-item:hover {
            background: rgba(255,255,255,0.2);
        }
        .tab-item.active {
            background: #22c55e;
        }
        .tab-icon { width: 20px; height: 20px; }
        .tab-info { flex: 1; overflow: hidden; }
        .tab-title {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tab-url {
            font-size: 11px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .status {
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 13px;
        }
        .status.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }
        .status.stopped {
            background: rgba(255,255,255,0.1);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h2>🎙️ Tab Audio Capture</h2>
    
    <button id="refreshBtn" class="btn btn-secondary">🔄 Refresh Tabs</button>
    
    <div id="tabList" class="tab-list">
        <p style="opacity: 0.7; text-align: center;">Click refresh to load tabs</p>
    </div>
    
    <button id="startBtn" class="btn btn-primary hidden">▶ Start Recording</button>
    <button id="stopBtn" class="btn btn-primary hidden">⏹ Stop Recording</button>
    
    <div id="status" class="status stopped">Ready</div>

    <script src="tab-selector.js"></script>
</body>
</html>
