<!DOCTYPE html>
<html>
<head>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #3182ce 100%);
            color: white;
            padding: 20px;
        }
        h2 {
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
        }
        .btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e3a5f 0%, #3182ce 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #2c5282 0%, #3182ce 100%);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.25);
        }
        .tab-list {
            max-height: 280px;
            overflow-y: auto;
            margin: 15px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px;
        }
        .tab-item {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            margin: 6px 0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .tab-item:hover {
            background: rgba(255,255,255,0.15);
        }
        .tab-item.active {
            background: linear-gradient(135deg, #1e3a5f 0%, #3182ce 100%);
            border: 1px solid #3182ce;
        }
        .tab-icon { width: 20px; height: 20px; border-radius: 4px; }
        .tab-info { flex: 1; overflow: hidden; }
        .tab-title {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tab-url {
            font-size: 11px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
            text-align: center;
            font-weight: 500;
        }
        .status.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }
        .status.stopped {
            background: rgba(255,255,255,0.1);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .hidden { display: none; }
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <h2>🎙️ Tab Audio Capture</h2>
    
    <div class="section-title">Select Tab to Record</div>
    <button id="refreshBtn" class="btn btn-secondary">🔄 Refresh Active Tabs</button>
    
    <div id="tabList" class="tab-list">
        <p style="opacity: 0.7; text-align: center; padding: 20px;">Click refresh to load tabs</p>
    </div>
    
    <button id="startBtn" class="btn btn-primary hidden">▶ Start Recording</button>
    <button id="stopBtn" class="btn btn-primary hidden" style="background: #ef4444;">⏹ Stop Recording</button>
    
    <div id="status" class="status stopped">Select a tab and click Start</div>

    <script src="tab-selector.js"></script>
</body>
</html>
