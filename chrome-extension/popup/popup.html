<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGS Automation</title>
    <style>
        :root {
            --primary: #1e3a5f;
            --primary-light: #2c5282;
            --accent: #3182ce;
            --bg-white: #ffffff;
            --bg-light: #f7f8fa;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --text-muted: #a0aec0;
            --border: #e2e8f0;
            --success: #38a169;
            --warning: #dd6b20;
            --error: #e53e3e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 380px;
            min-height: 320px;
            margin: 0 auto;
            background: var(--bg-white);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            overflow: hidden;
            background: white;
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; }
        
        .header-text { flex: 1; }
        .header h1 { font-size: 17px; font-weight: 700; color: white; letter-spacing: -0.3px; }
        .header .tagline { font-size: 12px; color: rgba(255,255,255,0.75); margin-top: 2px; }
        
        .floating-toggle {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        .floating-toggle:hover { background: rgba(255,255,255,0.25); }
        .floating-toggle.active { background: rgba(39, 174, 96, 0.3); border-color: rgba(39, 174, 96, 0.5); }
        .floating-toggle svg { width: 16px; height: 16px; fill: currentColor; }
        
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
        .status-dot.ok { background: var(--success); }
        .status-dot.error { background: var(--error); }
        .status-text { font-size: 12px; color: var(--text-secondary); }
        
        .section { padding: 14px 20px; border-bottom: 1px solid var(--border); }
        .section:last-child { border-bottom: none; }
        .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 10px; }
        
        .client-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            background: white;
            color: var(--text-primary);
            cursor: pointer;
        }
        .client-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-card { 
            background: var(--bg-light); 
            padding: 12px 10px; 
            border-radius: 8px; 
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-value { font-size: 22px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
        
        .call-card {
            background: var(--bg-light);
            border-radius: 10px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .call-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .call-badge.active { background: rgba(56, 161, 105, 0.12); color: var(--success); }
        .call-badge.ended { background: rgba(49, 130, 206, 0.12); color: var(--accent); }
        .call-badge.waiting { background: var(--bg-light); color: var(--text-muted); border: 1px dashed var(--border); }
        .call-badge.analyzing { background: rgba(221, 107, 32, 0.12); color: var(--warning); }
        
        .call-phone { font-size: 17px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .call-meta { font-size: 12px; color: var(--text-muted); }
        
        .analysis-card {
            background: white;
            border-radius: 8px;
            padding: 14px;
            margin-top: 12px;
            border: 1px solid var(--border);
        }
        .analysis-header { display: flex; justify-content: space-between; align-items: center; }
        
        .score-badge {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .score-circle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            color: white;
        }
        .score-circle.hot { background: linear-gradient(135deg, #e53e3e, #c53030); }
        .score-circle.warm { background: linear-gradient(135deg, #dd6b20, #c05621); }
        .score-circle.cold { background: linear-gradient(135deg, #3182ce, #2b6cb0); }
        
        .score-info { text-align: left; }
        .score-label { font-size: 14px; font-weight: 600; }
        .score-sublabel { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
        
        .divider { height: 1px; background: var(--border); margin: 12px 0; }
        
        .summary { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .tag { 
            font-size: 11px; 
            padding: 3px 10px; 
            border-radius: 20px; 
            background: rgba(49, 130, 206, 0.08); 
            color: var(--accent);
            font-weight: 500;
        }
        
        .waiting-state { 
            text-align: center; 
            padding: 24px 16px; 
            color: var(--text-muted); 
        }
        .waiting-icon { 
            font-size: 36px; 
            margin-bottom: 10px; 
            opacity: 0.4;
        }
        .waiting-text { font-size: 13px; }
        
        .actions { display: flex; gap: 10px; margin-top: 12px; }
        .btn {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn.secondary { 
            background: var(--bg-light); 
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn.secondary:hover { background: var(--bg-white); border-color: var(--accent); }
        .btn.primary { 
            background: var(--primary); 
            color: white; 
        }
        .btn.primary:hover { background: var(--primary-light); }
        
        .footer {
            padding: 10px 20px;
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-light);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="https://res.cloudinary.com/dbviya1rj/image/upload/v1773384037/gpnkwelbdcwfjmw5axtx.webp" alt="AGS Logo">
        </div>
        <div class="header-text">
            <h1>AGS Automation</h1>
            <div class="tagline">Call Analysis System</div>
        </div>
        <button class="floating-toggle" id="floatingToggle" title="Toggle Floating Widget">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
            <span>Float</span>
        </button>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Initializing...</span>
    </div>

    <div class="section">
        <div class="section-title">Client</div>
        <select class="client-select" id="clientSelect">
            <option value="flyland">Flyland Recovery</option>
            <option value="legacy">Legacy Services</option>
            <option value="tbt">TBT Communications</option>
            <option value="banyan">Banyan Health</option>
            <option value="takami">Takahami Medical</option>
            <option value="element">Element Medical</option>
        </select>
    </div>

    <div class="section">
        <div class="section-title">Today's Stats</div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="callsCount">0</div>
                <div class="stat-label">Calls</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="analyzedCount">0</div>
                <div class="stat-label">Analyzed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="hotCount">0</div>
                <div class="stat-label">Hot Leads</div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Latest Call</div>
        <div id="callContent">
            <div class="call-card">
                <div class="waiting-state">
                    <div class="waiting-icon">📞</div>
                    <div class="waiting-text">Monitoring for calls...</div>
                </div>
            </div>
        </div>
        <div class="actions">
            <button class="btn secondary" id="configBtn">⚙️ Settings</button>
            <button class="btn primary" id="refreshBtn">↻ Refresh</button>
        </div>
    </div>

    <div class="footer">
        v3.3 · Dynamic Mode · AGS Automation
    </div>

    <script src="popup.js"></script>
</body>
</html>
