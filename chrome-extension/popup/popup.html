<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGS Automation</title>
    <style>
        :root {
            --primary: #1e3a5f;
            --primary-light: #2c5282;
            --accent: #3182ce;
            --bg-white: #ffffff;
            --bg-light: #f7f8fa;
            --text-primary: #1a202c;
            --text-secondary: #4a5568;
            --text-muted: #a0aec0;
            --border: #e2e8f0;
            --success: #38a169;
            --warning: #dd6b20;
            --error: #e53e3e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 360px;
            min-height: 300px;
            margin: 0 auto;
            background: var(--bg-white);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .header {
            background: var(--primary);
            padding: 16px;
            text-align: center;
        }
        .header h1 { font-size: 16px; font-weight: 600; color: white; }
        .header .tagline { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 2px; }
        
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
        .status-dot.ok { background: var(--success); }
        .status-dot.error { background: var(--error); }
        .status-text { font-size: 12px; color: var(--text-secondary); }
        
        .section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; }
        
        .client-select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 13px;
            background: white;
        }
        .client-select:focus { outline: none; border-color: var(--accent); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-card { background: var(--bg-light); padding: 10px; border-radius: 4px; text-align: center; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        
        .call-card {
            background: var(--bg-light);
            border-radius: 8px;
            padding: 16px;
        }
        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .call-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .call-badge.active { background: rgba(56, 161, 105, 0.1); color: var(--success); }
        .call-badge.ended { background: rgba(49, 130, 206, 0.1); color: var(--accent); }
        .call-badge.waiting { background: var(--bg-light); color: var(--text-muted); }
        .call-badge.analyzing { background: rgba(221, 107, 32, 0.1); color: var(--warning); }
        
        .call-phone { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .call-meta { font-size: 12px; color: var(--text-muted); }
        
        .analysis-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .analysis-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .score-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
        }
        .score-circle.hot { background: var(--error); }
        .score-circle.warm { background: var(--warning); }
        .score-circle.cold { background: var(--accent); }
        
        .score-info { flex: 1; margin-left: 12px; }
        .score-label { font-size: 14px; font-weight: 600; }
        .score-sublabel { font-size: 11px; color: var(--text-muted); }
        
        .summary { font-size: 13px; color: var(--text-secondary); line-height: 1.4; margin-top: 8px; }
        .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .tag { font-size: 10px; padding: 3px 8px; border-radius: 3px; background: rgba(49, 130, 206, 0.1); color: var(--accent); }
        
        .waiting-state { text-align: center; padding: 20px; color: var(--text-muted); }
        .waiting-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }
        .waiting-text { font-size: 13px; }
        
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .btn {
            flex: 1;
            padding: 8px 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn:hover { background: var(--primary-light); }
        .btn.secondary { background: var(--bg-light); color: var(--text-primary); border: 1px solid var(--border); }
        .btn.secondary:hover { background: var(--bg-white); }
        
        .footer {
            padding: 10px 16px;
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-light);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AGS Automation</h1>
        <div class="tagline">Call Analysis</div>
    </div>

    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Initializing...</span>
    </div>

    <div class="section">
        <div class="section-title">Client</div>
        <select class="client-select" id="clientSelect">
            <option value="flyland">Flyland Recovery</option>
            <option value="legacy">Legacy Services</option>
            <option value="tbt">TBT Communications</option>
            <option value="banyan">Banyan Health</option>
            <option value="takami">Takahami Medical</option>
            <option value="element">Element Medical</option>
        </select>
    </div>

    <div class="section">
        <div class="section-title">Today's Stats</div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="callsCount">0</div>
                <div class="stat-label">Calls</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="analyzedCount">0</div>
                <div class="stat-label">Analyzed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="hotCount">0</div>
                <div class="stat-label">Hot</div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Latest Call</div>
        <div id="callContent">
            <div class="waiting-state">
                <div class="waiting-icon">📞</div>
                <div class="waiting-text">Monitoring for calls...</div>
            </div>
        </div>
        <div class="actions">
            <button class="btn secondary" id="configBtn">⚙️ Config</button>
            <button class="btn" id="refreshBtn">↻ Refresh</button>
        </div>
    </div>

    <div class="footer">
        v3.0 · API Mode · AGS Automation
    </div>

    <script src="popup.js"></script>
</body>
</html>
