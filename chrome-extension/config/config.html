<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Configuration</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --bg-white: #ffffff;
            --bg-light: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-white);
            color: var(--text-primary);
            font-size: 13px;
            padding: 20px;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 .logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            overflow: hidden;
        }
        h1 .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 20px 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .field {
            margin-bottom: 16px;
        }
        .field:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input[type="text"],
        input[type="url"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            transition: all 0.2s;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        .toggle-label {
            color: var(--text-primary);
            font-weight: 500;
        }
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #cbd5e1;
            border-radius: 24px;
            transition: 0.3s;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: 0.3s;
            box-shadow: var(--shadow);
        }
        .toggle input:checked + .toggle-slider {
            background: var(--primary);
        }
        .toggle input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }
        .btn {
            padding: 12px 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-right: 8px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow);
        }
        .btn.secondary {
            background: var(--bg-white);
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        .btn.secondary:hover {
            background: var(--bg-light);
            border-color: var(--primary);
        }
        .btn.danger {
            background: var(--error);
        }
        .btn.danger:hover {
            background: #dc2626;
        }
        .status {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        .status.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .status.success {
            background: rgba(16, 185, 129, 0.15);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status.error {
            background: rgba(239, 68, 68, 0.15);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .status.info {
            background: rgba(37, 99, 235, 0.15);
            color: #2563eb;
            border: 1px solid rgba(37, 99, 235, 0.3);
        }
        .client-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .client-card {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .client-card:hover {
            border-color: var(--primary);
        }
        .client-card.active {
            border-color: var(--primary);
            background: rgba(37, 99, 235, 0.05);
        }
        .client-card h3 {
            font-size: 14px;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        .client-card p {
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <h1>
        <span class="logo">
            <img src="https://res.cloudinary.com/dbviya1rj/image/upload/v1773384037/gpnkwelbdcwfjmw5axtx.webp" alt="AGS Logo">
        </span>
        AGS Configuration
    </h1>
    
    <div id="status" class="status"></div>

    <div class="section">
        <h2>Active Client</h2>
        <div class="field">
            <label>Select Client</label>
            <select id="clientSelect">
                <option value="flyland">Flyland Recovery</option>
                <option value="legacy">Legacy</option>
                <option value="tbt">TBT</option>
                <option value="banyan">Banyan</option>
                <option value="takami">Takahami</option>
                <option value="element">Element Medical</option>
            </select>
        </div>
    </div>

    <div class="section">
        <h2>Automation Settings</h2>
        <div class="toggle-row">
            <span class="toggle-label">Enable All Automations</span>
            <label class="toggle">
                <input type="checkbox" id="automationEnabled" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="toggle-row">
            <span class="toggle-label">Auto-search Salesforce</span>
            <label class="toggle">
                <input type="checkbox" id="autoSearchSF" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="toggle-row">
            <span class="toggle-label">Call Transcription</span>
            <label class="toggle">
                <input type="checkbox" id="transcriptionEnabled" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="toggle-row">
            <span class="toggle-label">AI Analysis</span>
            <label class="toggle">
                <input type="checkbox" id="aiAnalysisEnabled" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="toggle-row">
            <span class="toggle-label">Save to Markdown</span>
            <label class="toggle">
                <input type="checkbox" id="saveMarkdown" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>

    <div class="section">
        <h2>Salesforce Settings</h2>
        <div class="field">
            <label>Salesforce URL</label>
            <input type="url" id="salesforceUrl" placeholder="https://yourcompany.my.salesforce.com">
        </div>
    </div>

    <div class="section">
        <h2>AI Server Settings</h2>
        <div class="field">
            <label>AI Server URL</label>
            <input type="url" id="aiServerUrl" placeholder="http://localhost:8000">
        </div>
        <div class="field">
            <label>API Key (optional)</label>
            <input type="text" id="apiKey" placeholder="Enter API key if required">
        </div>
    </div>

    <div class="section">
        <h2>CTM Settings</h2>
        <div class="field">
            <label>CTM Selectors (comma separated)</label>
            <textarea id="ctmSelectors" placeholder=".call-status, .incoming-call, .phone-number"></textarea>
        </div>
    </div>

    <div class="section">
        <button class="btn" id="saveBtn">Save Configuration</button>
        <button class="btn secondary" id="resetBtn">Reset to Defaults</button>
        <button class="btn danger" id="clearBtn">Clear All Data</button>
    </div>

    <script src="config.js"></script>
</body>
</html>
